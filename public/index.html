<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery List</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-300 p-4 sm:p-8">
    <div class="bg-white p-6 rounded-lg shadow-lg max-w-lg mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-center">
            Grocery List
        </h1>
        <div class="flex gap-2 mb-4">
            <input id="inputItem" type="text" placeholder="Enter An Item.." class="border border-black p-3 flex-grow rounded">
            <button onclick="addItem()"class="bg-green-600 hover:bg-green-400 text-white px-5 py-3 rounded">Add</button>
        </div>
        <ul id="list" class="space-y-2"></ul>
    </div>
</body>
<script>
    async function retrieveItems() {
        let res = await fetch('/items');
        let items = await res.json();
        let listContent = document.getElementById('list');
        listContent.innerHTML = '';
        items.forEach(item => {
            let li = document.createElement('li');
            li.className = "flex justify-between items-center p-2 border border-gray-400";
            li.innerHTML =
                `
                <div class = "flex items-center gap-3">
                    <input id="${item.id}" type="checkbox" ${item.completed ? "checked" : ""} onchange="updateStatus(${item.id}, this.checked)">
                    <span>${item.name}</span>
                </div>
                <button onclick="deleteItem(${item.id})" class="text-red-500 hover:text-red-700">Delete</button>
            `;
            listContent.appendChild(li);
        })
    }
    retrieveItems();
    async function addItem() {
        let input = document.getElementById('inputItem');
        if (!input.value) return;

        await fetch('/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: input.value })
        });
        input.value = '';
        retrieveItems();
    }

    async function updateStatus(id,checked) {
        let checkBox = document.getElementById(id);

        await fetch(`/items/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({completed: checked})
        });
        retrieveItems();
    }

    async function deleteItem(id) {
        await fetch(`/items/${id}`, {
            method: 'DELETE'
        });
        retrieveItems();
    }
</script>
</html>
